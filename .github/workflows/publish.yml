name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  build:
    name: Build & publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare release APK
        id: prepare-apk
        uses: ././github/actions/prepare-apk
        with:
          build-type: release

      - name: Create GitHub Release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.prepare-apk.outputs.version-name }}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag "$TAG"
          git push origin "$TAG"
          
          gh release create "$TAG" \
            "TextIt-v${{ steps.version.outputs.version }}.apk" \
            --title "$TAG" \
            --notes "Automated APK release from master"
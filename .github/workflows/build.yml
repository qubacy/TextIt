name: Build

on:
  push:
  pull_request:
    types:
      - opened
  workflow_dispatch:

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096M -Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: "**/build/reports/tests/"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gradle setup
        uses: ./.github/actions/gradle-setup

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Android debug APK
        run: ./gradlew :androidApp:assembleDebug

      - name: Reading version
        id: version
        run: |
          VERSION=$(./gradlew properties -q | grep "^generalVersionName:" | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename debug APK
        run: |
          mv androidApp/build/outputs/apk/debug/androidApp-debug.apk \
             TextIt-v${{ steps.version.outputs.version }}.apk

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: androidApp/build/outputs/apk/debug/TextIt-v${{ steps.version.outputs.version }}.apk

      - name: Output artifact URL
        run: echo 'Artifact URL = ${{ steps.artifact-upload-step.outputs.artifact-url }}'